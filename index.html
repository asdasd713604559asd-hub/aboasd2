<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>شبكة الصقر - BeIN SPORTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    
    <style>
        body {
            background: #000;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            color: #fff;
        }
        /* تصميم عنوان الصفحة في الأعلى */
        .header-title {
            text-align: center;
            padding: 15px;
            background: #111;
            font-size: 20px;
            color: #fff;
            border-bottom: 2px solid #552a86; /* لون بنفسجي لتحديد العنوان */
        }
        .video-container {
            width: 100%;
            background: #111;
            position: relative;
        }
        .filter-server {
            display: flex;
            flex-wrap: wrap;
            background: #000;
            padding: 5px;
            gap: 5px;
        }
        .filter-server .button {
            flex: 1;
            min-width: 100px;
            text-align: center;
            background: #552a86; /* اللون البنفسجي */
            font-size: 14px;
            cursor: pointer;
            padding: 10px;
            border: 0;
            color: #fff;
            font-weight: 600;
            border-radius: 2px;
            transition: 0.3s;
        }
        .filter-server .button.active, .filter-server .button:hover {
            background: #e10000; /* اللون الأحمر عند التفعيل */
        }
        .video-con {
            width: 100%;
            height: 60vh;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        /* كود لتوسيط زر التشغيل الكبير في منتصف الفيديو */
        .video-js.vjs-big-play-centered .vjs-big-play-button {
            top: 50% !important;
            left: 50% !important;
            margin-top: -1em !important; /* نصف ارتفاع الزر */
            margin-left: -1.5em !important; /* نصف عرض الزر */
        }
        .footer-tag {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            background: #111;
            color: #888;
        }
    </style>
</head>
<body>

<div class="header-title">شبكة الصقر</div>

<div class="video-container">
    <div class="filter-server">
        <button class="button active" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/2e92140d/BeIN_SPORTS_1.m3u8')">BeIN 1</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/30e908fc/BeIN_SPORTS_2.m3u8')">BeIN 2</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/5506db83/BeIN_SPORTS_3.m3u8')">BeIN 3</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/f232c42b/BeIN_SPORTS_4.m3u8')">BeIN 4</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/1ef34955/BeIN_SPORTS_5.m3u8')">BeIN 5</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/68793d4f/BeIN_SPORTS_6.m3u8')">BeIN 6</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/4a515232/BeIN_SPORTS_7.m3u8')">BeIN 7</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/101ac041/BeIN_SPORTS_8.m3u8')">BeIN 8</button>
        <button class="button" onclick="changeChannel(this, 'https://sport.alamna.live/alammna/live/66b29143/BeIN_SPORTS_9.m3u8')">BeIN 9</button>
    </div>

    <div class="video-con">
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
            <source src="https://sport.alamna.live/alammna/live/2e92140d/BeIN_SPORTS_1.m3u8" type="application/x-mpegURL">
        </video>
    </div>
</div>

<div class="footer-tag">تطوير المهندس هيثم الأصبحي - شبكة الصقر</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    var player = videojs('my-video');

    function changeChannel(elem, url) {
        // تغيير حالة الزر النشط
        var buttons = document.getElementsByClassName('button');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove('active');
        }
        elem.classList.add('active');

        // تغيير رابط البث في المشغل
        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });
        player.play();
    }
</script>

</body>
</html>
